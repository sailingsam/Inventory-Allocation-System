services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oms
      POSTGRES_PASSWORD: oms
      POSTGRES_DB: oms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-insecure-secret-key-change-me
      DATABASE_URL: postgres://oms:oms@db:5432/oms
      CELERY_BROKER_URL: redis://redis:6379/0
      ALLOCATION_BACKORDER_ON_SHORTAGE: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://oms:oms@db:5432/oms
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://oms:oms@db:5432/oms
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
